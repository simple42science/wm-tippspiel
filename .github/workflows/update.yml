name: Update results
on:
  schedule:
    - cron: "12,42 * * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]
permissions:
  contents: write
concurrency:
  group: update-results
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch matches
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION: WC
          SEASON: "2026"
        run: node scripts/fetch-matches.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "wm-tippspiel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/matches.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen."
          else
            git commit -m "chore: Resultate aktualisiert"
            git push
          fi
